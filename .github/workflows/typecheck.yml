name: Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: install dependencies
        run: |
          pip install mypy
          pip install -r requirements.txt

      - name: run mypy
        run: mypy . --ignore-missing-imports --exclude venv
